<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Design Documenter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif !important; }
        .gradient-text {
            background: linear-gradient(135deg, #14b8a6 0%, #a855f7 50%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-underline {
            background: linear-gradient(135deg, #14b8a6 0%, #a855f7 50%, #f43f5e 100%);
            height: 3px;
        }
    </style>
</head>
<body class="bg-black text-white">

<div class="min-h-screen bg-black text-white">
    <!-- Header -->
    <div class="border-b border-gray-800 bg-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="goBack()" class="p-3 hover:bg-gray-900 rounded-2xl transition text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <div>
                        <h1 class="text-3xl font-bold text-white">Design com intenção,</h1>
                        <p class="text-gray-500 text-sm">sensibilidade e presença.</p>
                    </div>
                </div>
                <button onclick="exportData()" class="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-2xl hover:shadow-lg transition font-bold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Exportar
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        <div id="projectsContainer"></div>
    </div>
</div>

<script>
let projects = [];
let selectedProject = null;
const stages = ['Imersão', 'Pesquisa', 'Criação', 'Testes', 'Apresentação'];

function loadData() {
    const saved = localStorage.getItem('brandDesignProjectsV2');
    if (saved) {
        try {
            projects = JSON.parse(saved);
            if (projects.length > 0) {
                selectedProject = projects[0];
            }
        } catch (e) {
            console.error('Erro:', e);
        }
    }
    render();
}

function saveData() {
    localStorage.setItem('brandDesignProjectsV2', JSON.stringify(projects));
}

function addProject() {
    const newProject = {
        id: Date.now(),
        name: 'Novo Projeto',
        brand: 'Nome da Marca',
        stages: stages.map(s => ({
            id: Math.random(),
            name: s,
            status: 'pending',
            details: ''
        }))
    };
    projects.push(newProject);
    selectedProject = newProject;
    saveData();
    render();
}

function deleteProject(id) {
    projects = projects.filter(p => p.id !== id);
    if (selectedProject?.id === id) {
        selectedProject = projects[0] || null;
    }
    saveData();
    render();
}

function updateProjectField(field, value) {
    if (selectedProject) {
        selectedProject[field] = value;
        saveData();
        render();
    }
}

function updateStage(stageId, field, value) {
    if (selectedProject) {
        const stage = selectedProject.stages.find(s => s.id === stageId);
        if (stage) {
            stage[field] = value;
            saveData();
            render();
        }
    }
}

function deleteStage(stageId) {
    if (selectedProject) {
        selectedProject.stages = selectedProject.stages.filter(s => s.id !== stageId);
        saveData();
        render();
    }
}

function exportData() {
    const dataStr = JSON.stringify(projects, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `design-${selectedProject?.name || 'projeto'}-${new Date().toISOString().split('T')[0]}.json`;
    link.click();
}

function goBack() {
    window.location.href = './index.html';
}

function render() {
    const container = document.getElementById('projectsContainer');
    
    if (projects.length === 0) {
        container.innerHTML = `
            <div class="text-center py-20">
                <h2 class="text-4xl font-bold text-white mb-4">Documenter</h2>
                <p class="text-gray-500 mb-8">Organize seus processos de design</p>
                <button onclick="addProject()" class="px-8 py-4 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-2xl font-bold hover:shadow-lg transition">
                    + Novo Projeto
                </button>
            </div>
        `;
        return;
    }

    if (!selectedProject) return;

    const progressPercent = Math.round((selectedProject.stages.filter(s => s.status === 'completed').length / selectedProject.stages.length) * 100);

    container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-black border border-gray-800 rounded-2xl overflow-hidden">
                    <div class="px-6 py-5 border-b border-gray-800 bg-gray-950">
                        <h2 class="font-bold text-white text-lg">Projetos</h2>
                    </div>
                    <div class="divide-y divide-gray-800 max-h-96 overflow-y-auto">
                        ${projects.map(p => `
                            <div onclick="selectProject(${p.id})" class="p-4 cursor-pointer transition ${selectedProject.id === p.id ? 'bg-teal-950 border-l-4 border-teal-500' : 'hover:bg-gray-950'}">
                                <h3 class="font-bold text-white truncate">${p.name}</h3>
                                <p class="text-xs text-gray-500 truncate">${p.brand}</p>
                                <button onclick="event.stopPropagation(); deleteProject(${p.id})" class="mt-2 text-red-500 text-xs hover:text-red-400">Deletar</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <button onclick="addProject()" class="w-full mt-4 px-6 py-3 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-2xl font-bold">
                    + Novo
                </button>
            </div>

            <!-- Main Content -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Header -->
                <div class="bg-black border border-gray-800 rounded-2xl p-8">
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-2">
                            <input type="text" value="${selectedProject.name}" onchange="updateProjectField('name', this.value)" class="text-4xl font-bold bg-transparent text-white outline-none border-b-2 border-gray-700 focus:border-teal-500 w-full" />
                        </div>
                        <div class="flex items-center gap-3 mt-4">
                            <label class="text-gray-500 text-sm font-bold">MARCA</label>
                            <input type="text" value="${selectedProject.brand}" onchange="updateProjectField('brand', this.value)" class="text-lg font-bold bg-transparent text-teal-500 outline-none border-b-2 border-gray-700 focus:border-teal-500 flex-1" />
                        </div>
                    </div>

                    <!-- Progress -->
                    <div class="mt-8">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-sm text-gray-500 font-bold">PROGRESSO</span>
                            <span class="text-lg font-bold gradient-text">${progressPercent}%</span>
                        </div>
                        <div class="w-full bg-gray-900 rounded-full h-2 overflow-hidden">
                            <div class="h-full gradient-underline transition-all duration-300" style="width: ${progressPercent}%"></div>
                        </div>
                    </div>
                </div>

                <!-- Stages -->
                <div class="space-y-4">
                    <h2 class="text-3xl font-bold text-white">Etapas do Design</h2>
                    
                    ${selectedProject.stages.map((stage, idx) => `
                        <div class="border-2 border-gray-700 rounded-2xl p-6 transition bg-black hover:border-gray-600">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-4 mb-2">
                                        <span class="text-3xl font-bold text-white">${String(idx + 1).padStart(2, '0')}</span>
                                        <div class="flex-1">
                                            <h3 class="text-xl font-bold text-white">${stage.name}</h3>
                                            <span class="text-xs font-bold mt-1 block text-gray-500">
                                                ${stage.status === 'completed' ? '✓ Concluído' : stage.status === 'in-progress' ? '◉ Em Andamento' : '○ Pendente'}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex gap-2">
                                    <select onchange="updateStage(${stage.id}, 'status', this.value)" class="px-4 py-2 rounded-lg text-sm font-bold cursor-pointer bg-gray-900 border border-gray-800 text-gray-400">
                                        <option value="pending" ${stage.status === 'pending' ? 'selected' : ''}>Pendente</option>
                                        <option value="in-progress" ${stage.status === 'in-progress' ? 'selected' : ''}>Em Andamento</option>
                                        <option value="completed" ${stage.status === 'completed' ? 'selected' : ''}>Concluído</option>
                                    </select>

                                    <button onclick="toggleDetails(${stage.id})" class="p-2 rounded-lg transition text-gray-500 hover:text-white hover:bg-gray-900">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                        </svg>
                                    </button>

                                    <button onclick="deleteStage(${stage.id})" class="p-2 hover:bg-red-500/20 rounded-lg transition text-red-500">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>

                            <div id="details-${stage.id}" class="hidden mt-4 pt-4 border-t border-gray-700 space-y-4">
                                <div>
                                    <label class="text-xs font-bold text-gray-500 block mb-2">DETALHES:</label>
                                    <textarea onchange="updateStage(${stage.id}, 'details', this.value)" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-sm resize-none h-20 outline-none focus:border-teal-500 text-white placeholder-gray-600 font-medium">${stage.details}</textarea>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-3 gap-4 pt-6">
                    <div class="bg-black rounded-2xl border border-gray-800 p-6 text-center">
                        <div class="text-3xl font-bold gradient-text">${selectedProject.stages.filter(s => s.status === 'completed').length}</div>
                        <div class="text-xs text-gray-500 mt-2 font-bold">CONCLUÍDAS</div>
                    </div>
                    <div class="bg-black rounded-2xl border border-gray-800 p-6 text-center">
                        <div class="text-3xl font-bold gradient-text">${selectedProject.stages.filter(s => s.status === 'in-progress').length}</div>
                        <div class="text-xs text-gray-500 mt-2 font-bold">EM ANDAMENTO</div>
                    </div>
                    <div class="bg-black rounded-2xl border border-gray-800 p-6 text-center">
                        <div class="text-3xl font-bold gradient-text">${selectedProject.stages.length}</div>
                        <div class="text-xs text-gray-500 mt-2 font-bold">TOTAL</div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function selectProject(id) {
    selectedProject = projects.find(p => p.id === id);
    render();
}

function toggleDetails(stageId) {
    const elem = document.getElementById(`details-${stageId}`);
    if (elem) {
        elem.classList.toggle('hidden');
    }
}

loadData();
</script>

</body>
</html>
