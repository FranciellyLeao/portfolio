<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Freelas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif !important; }
        .gradient-text {
            background: linear-gradient(135deg, #14b8a6 0%, #a855f7 50%, #f43f5e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-black text-white">

<div class="min-h-screen bg-black text-white">
    <!-- Header -->
    <div class="border-b border-gray-800 bg-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="goBack()" class="p-3 hover:bg-gray-900 rounded-2xl transition text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <h1 class="text-3xl font-bold text-white">Controle de <span class="gradient-text">Freelas</span></h1>
                </div>
                <button onclick="exportData()" class="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-2xl hover:shadow-lg transition font-bold">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Exportar
                </button>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <!-- Preços Padrão -->
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">Meus Preços Padrão</h2>
            <textarea id="pricesNotes" placeholder="Adicione seus preços aqui (ex: Logo - R$ 500, Branding - R$ 2000, etc)" class="w-full bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 placeholder-gray-600 font-medium resize-none h-24" onchange="saveData()"></textarea>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4" id="statsContainer"></div>

        <!-- Form -->
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <h2 class="text-2xl font-bold text-white mb-6">Novo Freela</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                <input type="text" id="cliente" placeholder="Nome do cliente" class="bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 placeholder-gray-600 font-medium" />
                
                <input type="text" id="tipoJob" placeholder="Tipo de trabalho" class="bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 placeholder-gray-600 font-medium" />

                <input type="number" id="preco" placeholder="Preço (R$)" class="bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 placeholder-gray-600 font-medium" />

                <input type="date" id="dataEntrega" class="bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
            </div>

            <div class="flex items-center gap-3 mb-4">
                <input type="checkbox" id="recorrente" class="w-5 h-5 rounded cursor-pointer" />
                <label for="recorrente" class="text-gray-400 cursor-pointer font-medium">É um trabalho recorrente?</label>
            </div>

            <button onclick="addFreela()" class="w-full px-6 py-3 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-2xl hover:shadow-lg transition font-bold flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Adicionar Freela
            </button>
        </div>

        <!-- Abas -->
        <div class="flex gap-2 border-b border-gray-800">
            <button onclick="mudarAba('ativos')" id="aba-ativos" class="px-6 py-3 font-bold text-white border-b-2 border-teal-500 transition">
                📌 Ativos
            </button>
            <button onclick="mudarAba('recorrentes')" id="aba-recorrentes" class="px-6 py-3 font-bold text-gray-500 border-b-2 border-transparent hover:text-white transition">
                🔄 Recorrentes
            </button>
        </div>

        <!-- Conteúdo das Abas -->
        <div class="space-y-6" id="freelasContainer"></div>

        <!-- Footer -->
        <div class="border-t border-gray-800 pt-8" id="footerStats"></div>

        <!-- Área de Arquivados (Escondida) -->
        <div class="mt-12 pt-8 border-t-2 border-gray-700">
            <button onclick="toggleArquivados()" class="text-gray-500 hover:text-gray-400 font-bold text-sm flex items-center gap-2 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
                📦 Ver Arquivados
            </button>
            
            <div id="area-arquivados" class="hidden mt-6 space-y-6">
                <div class="space-y-6" id="freelasArquivadosContainer"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Alterações -->
<div id="modal-alteracoes" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-black border border-gray-800 rounded-2xl max-w-md w-full p-6 space-y-4">
        <h2 class="text-2xl font-bold text-white">Adicionar Alteração</h2>
        
        <div>
            <label class="text-sm text-gray-500 font-bold mb-2 block">📅 Data</label>
            <input type="date" id="data-alteracao" class="w-full bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
        </div>

        <div>
            <label class="text-sm text-gray-500 font-bold mb-2 block">📝 Descrição</label>
            <textarea id="desc-alteracao" placeholder="Ex: Cliente pediu aumento de preço, mudança na data de entrega..." class="w-full bg-gray-950 border border-gray-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-teal-500 font-medium resize-none h-24"></textarea>
        </div>

        <div class="flex gap-3">
            <button onclick="fecharAlteracoes()" class="flex-1 px-4 py-3 bg-gray-900 text-gray-400 rounded-lg hover:bg-gray-800 transition font-bold">
                Cancelar
            </button>
            <button onclick="salvarAlteracao()" class="flex-1 px-4 py-3 bg-gradient-to-r from-teal-500 via-purple-500 to-red-500 text-white rounded-lg hover:shadow-lg transition font-bold">
                ✓ Salvar
            </button>
        </div>
    </div>
</div>

<script>
let freelas = [];
let pricesNotes = '';
let frelaSelecionada = null;
let abaAtual = 'ativos';

function loadData() {
    const saved = localStorage.getItem('freelasDataV5');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            freelas = data.freelas || [];
            pricesNotes = data.pricesNotes || '';
            document.getElementById('pricesNotes').value = pricesNotes;
        } catch (e) {
            console.error('Erro:', e);
        }
    }
    render();
}

function saveData() {
    pricesNotes = document.getElementById('pricesNotes').value;
    localStorage.setItem('freelasDataV5', JSON.stringify({ freelas, pricesNotes }));
}

function mudarAba(aba) {
    abaAtual = aba;
    
    const btnAtivos = document.getElementById('aba-ativos');
    const btnRecorrentes = document.getElementById('aba-recorrentes');
    
    if (aba === 'ativos') {
        btnAtivos.classList.add('text-white');
        btnAtivos.classList.remove('text-gray-500');
        btnAtivos.style.borderBottomColor = '#14b8a6';
        
        btnRecorrentes.classList.remove('text-white');
        btnRecorrentes.classList.add('text-gray-500');
        btnRecorrentes.style.borderBottomColor = 'transparent';
    } else {
        btnAtivos.classList.remove('text-white');
        btnAtivos.classList.add('text-gray-500');
        btnAtivos.style.borderBottomColor = 'transparent';
        
        btnRecorrentes.classList.add('text-white');
        btnRecorrentes.classList.remove('text-gray-500');
        btnRecorrentes.style.borderBottomColor = '#14b8a6';
    }
    
    render();
}

function toggleArquivados() {
    const area = document.getElementById('area-arquivados');
    area.classList.toggle('hidden');
    renderArquivados();
}

function addFreela() {
    const cliente = document.getElementById('cliente').value;
    const tipoJob = document.getElementById('tipoJob').value;
    const preco = parseFloat(document.getElementById('preco').value) || 0;
    const dataEntrega = document.getElementById('dataEntrega').value;
    const recorrente = document.getElementById('recorrente').checked;

    if (!cliente.trim() || !tipoJob.trim() || !dataEntrega || preco <= 0) {
        alert('Preencha todos os campos corretamente!');
        return;
    }

    const agora = new Date().toISOString();

    freelas.push({
        id: Date.now(),
        cliente,
        tipoJob,
        preco,
        dataEntrega,
        pago: false,
        notaEmitida: false,
        recorrente,
        arquivado: false,
        criadoEm: agora,
        historico: [
            {
                versao: 1,
                data: agora,
                acao: 'Criado',
                detalhes: `${cliente} - ${tipoJob} - R$ ${preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})} ${recorrente ? '(Recorrente)' : ''}`
            }
        ]
    });

    document.getElementById('cliente').value = '';
    document.getElementById('tipoJob').value = '';
    document.getElementById('preco').value = '';
    document.getElementById('dataEntrega').value = '';
    document.getElementById('recorrente').checked = false;

    saveData();
    render();
}

function arquivarFreela(id) {
    const frela = freelas.find(f => f.id === id);
    if (frela) {
        frela.arquivado = !frela.arquivado;
        
        const agora = new Date().toISOString();
        const novaVersao = frela.historico.length + 1;
        
        frela.historico.push({
            versao: novaVersao,
            data: agora,
            acao: frela.arquivado ? 'Arquivado' : 'Desarquivado',
            detalhes: frela.arquivado ? '📦 Freela arquivado' : '📌 Freela desarquivado'
        });
        
        saveData();
        render();
    }
}

function abrirAlteracoes(id) {
    frelaSelecionada = id;
    document.getElementById('modal-alteracoes').classList.remove('hidden');
    document.getElementById('data-alteracao').value = new Date().toISOString().split('T')[0];
    document.getElementById('desc-alteracao').value = '';
}

function fecharAlteracoes() {
    document.getElementById('modal-alteracoes').classList.add('hidden');
    frelaSelecionada = null;
}

function salvarAlteracao() {
    if (!frelaSelecionada) return;

    const frela = freelas.find(f => f.id === frelaSelecionada);
    if (!frela) return;

    const data = document.getElementById('data-alteracao').value;
    const descricao = document.getElementById('desc-alteracao').value;

    if (!data || !descricao.trim()) {
        alert('Preencha data e descrição!');
        return;
    }

    const novaVersao = frela.historico.length + 1;
    const dataISO = new Date(data + 'T00:00:00').toISOString();

    frela.historico.push({
        versao: novaVersao,
        data: dataISO,
        acao: 'Alteração',
        detalhes: descricao
    });

    saveData();
    render();
    fecharAlteracoes();
}

function togglePago(id) {
    const frela = freelas.find(f => f.id === id);
    if (frela) {
        // Se é recorrente, adiciona ao histórico de pagamentos mensais
        if (frela.recorrente) {
            if (!frela.pagamentosMensais) {
                frela.pagamentosMensais = [];
            }
            
            const agora = new Date();
            const mesAno = `${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;
            
            // Verifica se já existe pagamento pra este mês
            const pagamentoExistente = frela.pagamentosMensais.find(p => p.mesAno === mesAno);
            
            if (pagamentoExistente) {
                // Remove o pagamento do mês
                frela.pagamentosMensais = frela.pagamentosMensais.filter(p => p.mesAno !== mesAno);
            } else {
                // Adiciona novo pagamento
                frela.pagamentosMensais.push({
                    mesAno: mesAno,
                    data: agora.toISOString(),
                    valor: frela.preco
                });
            }
            
            const agora2 = new Date().toISOString();
            const novaVersao = frela.historico.length + 1;
            frela.historico.push({
                versao: novaVersao,
                data: agora2,
                acao: 'Pagamento Mensal',
                detalhes: pagamentoExistente ? `❌ Pagamento de ${mesAno} removido` : `✓ Pagamento de ${mesAno} registrado - R$ ${frela.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`
            });
        } else {
            // Para não-recorrentes, funciona normal
            frela.pago = !frela.pago;
            
            const agora = new Date().toISOString();
            const novaVersao = frela.historico.length + 1;
            
            frela.historico.push({
                versao: novaVersao,
                data: agora,
                acao: frela.pago ? 'Marcado como Pago' : 'Marcado como Pendente',
                detalhes: frela.pago ? '💰 Pagamento confirmado' : '⏳ Aguardando pagamento'
            });
        }
        
        saveData();
        render();
    }
}

function toggleNota(id) {
    const frela = freelas.find(f => f.id === id);
    if (frela) {
        frela.notaEmitida = !frela.notaEmitida;
        
        const agora = new Date().toISOString();
        const novaVersao = frela.historico.length + 1;
        
        frela.historico.push({
            versao: novaVersao,
            data: agora,
            acao: frela.notaEmitida ? 'Nota Emitida' : 'Nota Removida',
            detalhes: frela.notaEmitida ? '📄 Nota fiscal emitida' : '📄 Nota removida'
        });
        
        saveData();
        render();
    }
}

function toggleEdit(id) {
    const elem = document.getElementById(`edit-${id}`);
    if (elem) {
        elem.classList.toggle('hidden');
    }
}

function toggleHistorico(id) {
    const elem = document.getElementById(`historico-${id}`);
    if (elem) {
        elem.classList.toggle('hidden');
    }
}

function updateFreela(id, field, value) {
    const frela = freelas.find(f => f.id === id);
    if (frela) {
        const valorAnterior = frela[field];
        frela[field] = value;
        
        const agora = new Date().toISOString();
        const novaVersao = frela.historico.length + 1;
        
        let descricao = '';
        if (field === 'cliente') descricao = `Cliente alterado de "${valorAnterior}" para "${value}"`;
        else if (field === 'tipoJob') descricao = `Tipo de trabalho alterado de "${valorAnterior}" para "${value}"`;
        else if (field === 'preco') descricao = `Preço alterado de R$ ${valorAnterior.toLocaleString('pt-BR', {minimumFractionDigits: 2})} para R$ ${value.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        else if (field === 'dataEntrega') descricao = `Data de entrega alterada de ${valorAnterior} para ${value}`;
        
        frela.historico.push({
            versao: novaVersao,
            data: agora,
            acao: 'Alteração',
            detalhes: descricao
        });
        
        saveData();
        render();
    }
}

function deleteFreela(id) {
    freelas = freelas.filter(f => f.id !== id);
    saveData();
    render();
}

function exportData() {
    let text = `CONTROLE DE FREELAS\n\n`;
    text += `PREÇOS PADRÃO:\n${pricesNotes}\n\n`;
    text += `FREELAS:\n`;
    freelas.forEach((f, i) => {
        text += `${i+1}. ${f.cliente} - ${f.tipoJob} - R$ ${f.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})} - ${f.pago ? 'PAGO' : 'PENDENTE'} - ${f.recorrente ? 'RECORRENTE' : 'ÚNICO'} - ${f.arquivado ? 'ARQUIVADO' : 'ATIVO'}\n`;
    });
    
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `freelas-${new Date().toISOString().split('T')[0]}.txt`;
    link.click();
}

function goBack() {
    window.location.href = './index.html';
}

function getFrelasParaMostrar() {
    if (abaAtual === 'ativos') {
        return freelas.filter(f => !f.arquivado && !f.recorrente);
    } else if (abaAtual === 'recorrentes') {
        return freelas.filter(f => !f.arquivado && f.recorrente);
    }
    return [];
}

function renderArquivados() {
    const frelasArquivadas = freelas.filter(f => f.arquivado);
    const container = document.getElementById('freelasArquivadosContainer');
    
    if (frelasArquivadas.length === 0) {
        container.innerHTML = `<div class="text-center py-8 bg-gray-950 rounded-2xl border border-dashed border-gray-700"><p class="text-gray-500 text-sm font-bold">Nenhum freela arquivado</p></div>`;
        return;
    }

    container.innerHTML = frelasArquivadas.map((frela) => `
        <div class="bg-gray-900/30 border border-gray-700 rounded-2xl overflow-hidden">
            <div class="p-4">
                <div class="grid grid-cols-1 lg:grid-cols-5 gap-3 items-center text-sm">
                    <div>
                        <p class="text-xs text-gray-600 font-bold mb-1">CLIENTE</p>
                        <p class="font-bold text-gray-300">${frela.cliente}</p>
                        <p class="text-xs text-gray-600 mt-0.5">${frela.tipoJob}</p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-600 font-bold mb-1">ENTREGA</p>
                        <p class="font-bold text-gray-400">${new Date(frela.dataEntrega).toLocaleDateString('pt-BR')}</p>
                    </div>

                    <div>
                        <p class="text-xs text-gray-600 font-bold mb-1">VALOR</p>
                        <p class="font-bold text-gray-300">R$ ${frela.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                    </div>

                    <div>
                        <span class="text-xs font-bold px-2 py-1 rounded ${frela.pago ? 'bg-purple-500/20 text-purple-400' : 'bg-orange-500/20 text-orange-400'}">
                            ${frela.pago ? 'Pago' : 'Pendente'}
                        </span>
                    </div>

                    <div class="flex gap-2 justify-end">
                        <button onclick="arquivarFreela(${frela.id})" class="p-1.5 bg-green-500/10 text-green-400 rounded-lg hover:bg-green-500/20 transition border border-green-500/30" title="Desarquivar">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                            </svg>
                        </button>

                        <button onclick="deleteFreela(${frela.id})" class="p-1.5 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500/20 transition border border-red-500/30">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

function render() {
    const frelasParaMostrar = getFrelasParaMostrar();
    const totalValor = freelas.filter(f => !f.arquivado).reduce((acc, f) => acc + f.preco, 0);
    const totalPago = freelas.filter(f => !f.arquivado && f.pago).reduce((acc, f) => acc + f.preco, 0);
    const totalPendente = totalValor - totalPago;
    const notasEmitidas = freelas.filter(f => !f.arquivado && f.notaEmitida).length;

    document.getElementById('statsContainer').innerHTML = `
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <div class="text-sm text-gray-500 font-bold mb-1">TOTAL DE JOBS</div>
            <div class="text-3xl font-bold gradient-text">${freelas.filter(f => !f.arquivado).length}</div>
        </div>
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <div class="text-sm text-gray-500 font-bold mb-1">VALOR TOTAL</div>
            <div class="text-3xl font-bold gradient-text">R$ ${totalValor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
        </div>
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <div class="text-sm text-gray-500 font-bold mb-1">RECEBIDO</div>
            <div class="text-3xl font-bold gradient-text">R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
        </div>
        <div class="bg-black border border-gray-800 rounded-2xl p-6">
            <div class="text-sm text-gray-500 font-bold mb-1">PENDENTE</div>
            <div class="text-3xl font-bold gradient-text">R$ ${totalPendente.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
        </div>
    `;

    const container = document.getElementById('freelasContainer');
    if (frelasParaMostrar.length === 0) {
        container.innerHTML = `<div class="text-center py-16 bg-gray-950 rounded-2xl border-2 border-dashed border-gray-800"><p class="text-gray-500 text-lg font-bold">Nenhum freela nesta seção</p></div>`;
    } else {
        container.innerHTML = frelasParaMostrar.map((frela, idx) => `
            <div class="bg-black border border-gray-800 rounded-2xl overflow-hidden">
                <div class="p-6">
                    <div class="grid grid-cols-1 lg:grid-cols-6 gap-4 items-start">
                        <div class="lg:col-span-2">
                            <p class="text-sm text-gray-500 font-bold mb-1">CLIENTE ${frela.recorrente ? '🔄' : ''}</p>
                            <p class="text-lg font-bold text-white">${frela.cliente}</p>
                            <p class="text-xs text-gray-500 mt-1">${frela.tipoJob}</p>
                        </div>

                        <div class="lg:col-span-1">
                            <p class="text-sm text-gray-500 font-bold mb-1">ENTREGA</p>
                            <p class="font-bold text-gray-400">${new Date(frela.dataEntrega).toLocaleDateString('pt-BR')}</p>
                        </div>

                        <div class="lg:col-span-1">
                            <p class="text-sm text-gray-500 font-bold mb-1">VALOR</p>
                            <p class="text-lg font-bold gradient-text">R$ ${frela.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        </div>

                        <div class="lg:col-span-2 flex gap-2 justify-end flex-wrap">
                            <button onclick="togglePago(${frela.id})" class="flex items-center gap-1 px-4 py-2 rounded-lg transition font-bold text-sm ${frela.recorrente ? (frela.pagamentosMensais && frela.pagamentosMensais.length > 0 ? 'bg-purple-500/20 text-purple-400 border border-purple-500/50' : 'bg-gray-900 text-gray-500 border border-gray-800') : (frela.pago ? 'bg-purple-500/20 text-purple-400 border border-purple-500/50' : 'bg-gray-900 text-gray-500 border border-gray-800')}">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                ${frela.recorrente ? (frela.pagamentosMensais && frela.pagamentosMensais.length > 0 ? `${frela.pagamentosMensais.length} Pago` : 'Marcar Pago') : (frela.pago ? 'Pago' : 'Pendente')}
                            </button>

                            <button onclick="toggleNota(${frela.id})" class="flex items-center gap-1 px-4 py-2 rounded-lg transition font-bold text-sm ${frela.notaEmitida ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-gray-900 text-gray-500 border border-gray-800'}">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                ${frela.notaEmitida ? 'Nota OK' : 'Nota'}
                            </button>

                            <button onclick="abrirAlteracoes(${frela.id})" class="p-2 bg-orange-500/10 text-orange-400 rounded-lg hover:bg-orange-500/20 transition border border-orange-500/30" title="Adicionar alteração">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </button>

                            <button onclick="toggleHistorico(${frela.id})" class="p-2 bg-blue-500/10 text-blue-400 rounded-lg hover:bg-blue-500/20 transition border border-blue-500/30" title="Ver histórico">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </button>

                            ${!frela.recorrente ? `
                                <button onclick="arquivarFreela(${frela.id})" class="p-2 bg-yellow-500/10 text-yellow-400 rounded-lg hover:bg-yellow-500/20 transition border border-yellow-500/30" title="Arquivar">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                                    </svg>
                                </button>
                            ` : ''}

                            ${frela.arquivado ? `
                                <button onclick="arquivarFreela(${frela.id})" class="p-2 bg-green-500/10 text-green-400 rounded-lg hover:bg-green-500/20 transition border border-green-500/30" title="Desarquivar">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                                    </svg>
                                </button>
                            ` : ''}

                            <button onclick="toggleEdit(${frela.id})" class="p-2 bg-teal-500/10 text-teal-400 rounded-lg hover:bg-teal-500/20 transition border border-teal-500/30">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                            </button>

                            <button onclick="deleteFreela(${frela.id})" class="p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500/20 transition border border-red-500/30">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="historico-${frela.id}" class="hidden border-t border-gray-800 bg-gray-950 p-6">
                    ${frela.recorrente && frela.pagamentosMensais && frela.pagamentosMensais.length > 0 ? `
                        <h3 class="text-sm font-bold text-green-400 mb-4">💳 Pagamentos Mensais</h3>
                        <div class="space-y-2 mb-6 pb-6 border-b border-gray-700">
                            ${frela.pagamentosMensais.map((pag, idx) => `
                                <div class="bg-black border border-gray-800 rounded-lg p-2 flex items-center justify-between">
                                    <span class="text-sm font-bold text-gray-300">${pag.mesAno}</span>
                                    <span class="text-sm text-green-400">R$ ${pag.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    
                    <h3 class="text-sm font-bold text-blue-400 mb-4">📜 Histórico de Alterações</h3>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${frela.historico.map((h, hIdx) => `
                            <div class="bg-black border border-gray-800 rounded-lg p-3">
                                <div class="flex items-start justify-between mb-2">
                                    <div>
                                        <p class="text-xs font-bold text-gray-500">VERSÃO ${h.versao}</p>
                                        <p class="text-sm font-bold text-teal-400">${h.acao}</p>
                                    </div>
                                    <span class="text-xs text-gray-600">${new Date(h.data).toLocaleDateString('pt-BR')} ${new Date(h.data).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</span>
                                </div>
                                <p class="text-sm text-gray-400">${h.detalhes}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div id="edit-${frela.id}" class="hidden border-t border-gray-800 bg-gray-950 p-6">
                    <h3 class="text-sm font-bold text-teal-400 mb-4">✏️ Editar Freela</h3>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-gray-500 font-bold mb-2 block">CLIENTE</label>
                            <input type="text" value="${frela.cliente}" onchange="updateFreela(${frela.id}, 'cliente', this.value)" class="w-full bg-black border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 font-bold mb-2 block">TIPO DE TRABALHO</label>
                            <input type="text" value="${frela.tipoJob}" onchange="updateFreela(${frela.id}, 'tipoJob', this.value)" class="w-full bg-black border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 font-bold mb-2 block">PREÇO (R$)</label>
                            <input type="number" value="${frela.preco}" onchange="updateFreela(${frela.id}, 'preco', parseFloat(this.value))" class="w-full bg-black border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 font-bold mb-2 block">DATA DE ENTREGA</label>
                            <input type="date" value="${frela.dataEntrega}" onchange="updateFreela(${frela.id}, 'dataEntrega', this.value)" class="w-full bg-black border border-gray-800 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-teal-500 font-medium" />
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    if (freelas.filter(f => !f.arquivado).length > 0) {
        document.getElementById('footerStats').innerHTML = `
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <p class="text-xs text-gray-500 font-bold mb-2">JOBS PAGOS</p>
                    <p class="text-2xl font-bold gradient-text">${freelas.filter(f => !f.arquivado && f.pago).length}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-bold mb-2">JOBS PENDENTES</p>
                    <p class="text-2xl font-bold gradient-text">${freelas.filter(f => !f.arquivado && !f.pago).length}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-bold mb-2">RECORRENTES</p>
                    <p class="text-2xl font-bold gradient-text">${freelas.filter(f => !f.arquivado && f.recorrente).length}</p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-bold mb-2">ARQUIVADOS</p>
                    <p class="text-2xl font-bold gradient-text">${freelas.filter(f => f.arquivado).length}</p>
                </div>
            </div>
        `;
    }
}

loadData();
</script>

</body>
</html>
